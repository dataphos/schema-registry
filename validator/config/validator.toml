# configuration for central consumer
mode = ""
schema_id = ""
schema_version = ""
schema_type = ""

[consumer]
type = "" # insert "kafka", "pubsub", "servicebus" or "jetstream"
encryption_key = ""

[consumer.kafka]
address = "" # insert
topic = "" # insert
group_id = "" # insert
# Optional SCRAM-SHA-512 (requires tls_config.enabled; mutually exclusive with krb_config):
# [consumer.kafka.sasl_config]
# mechanism = "scram-sha-512"
# user = ""
# password = ""

[consumer.pubsub]
project_id = "" # insert
subscription_id = "" # insert

[consumer.servicebus]
connection_string = "" # insert
topic = "" # insert
subscription = "" # insert

[consumer.jetstream]
url = "" # insert
subject = "" # insert
consumer_name = "" # insert

[producer]
type = "" # insert "kafka", "eventhubs", "pubsub", "servicebus", "jetstream", "pulsar" or "gcs"

[producer.kafka]
address = "" # insert
# Optional SASL_SSL with SCRAM-SHA-512 (requires tls_config.enabled = true; mutually exclusive with krb_config):
# [producer.kafka.sasl_config]
# mechanism = "scram-sha-512"
# user = ""
# password = ""

[producer.pubsub]
project_id = "" # insert

# When producer.type = "gcs", [topics].valid and [topics].dead_letter are GCS bucket names (not Pub/Sub topics).
# Uses application default credentials. Each validated message is stored as one object.
[producer.gcs]
# project_id = "" # optional; passed through to the GCS client config
# credentials_file = "" # optional path to service account JSON; default ADC
# endpoint = "" # optional, e.g. fake GCS emulator
object_prefix = "messages"
# content_type = "application/octet-stream"

[producer.servicebus]
connection_string = "" # insert

[producer.jetstream]
url = "" # insert

[topics]
# For broker producers (kafka, pubsub, ...): topic or subscription target names.
# For producer.type = "gcs": names of the buckets for valid vs invalid (dead-letter) payloads.
valid = "" # insert
dead_letter = "" # insert

[registry]
url = ""
type = "janitor" # insert "janitor" or "apicurio"
groupID = "default"

[validators]
enable_json = "true"
enable_csv = "false"
enable_xml = "false"
enable_protobuf = "false"
csv_url = "http://csv-validator-svc:8080"
xml_url = "http://xml-validator-svc:8081"
